modules:
  # Spike M0-7: multi-entry resource (Preview) — validate Confluence module support
  macro:
    - key: entrytest-macro
      resource: ui/macro
      title: entrytest-macro (spike)
      resolver:
        function: resolver-fn
      config:
        resource: ui/config
        title: entrytest config (spike M0-6)
        viewportSize: large
        openOnInsert: true
  # contentBylineItem validated via lint only — a deployed dev byline chip would
  # appear on every page of the site; schema acceptance is identical to the others.
  confluence:globalPage:
    - key: entrytest-dashboard
      resource: ui/dashboard
      route: entrytest-dashboard
      title: entrytest-dashboard (spike)
  confluence:globalSettings:
    - key: entrytest-settings
      resource: ui/settings
      title: entrytest-settings (spike)
  webtrigger:
    - key: seed
      function: seed-fn
    - key: measure
      function: measure-fn
    - key: wipe
      function: wipe-fn
    - key: permcheck
      function: permcheck-fn
  function:
    - key: seed-fn
      handler: index.seed
    - key: measure-fn
      handler: index.measure
    - key: wipe-fn
      handler: index.wipe
    - key: permcheck-fn
      handler: permcheck.run
    - key: resolver-fn
      handler: resolver.handler
resources:
  - key: ui
    path: static/ui
    entry:
      macro: macro.html
      byline: byline.html
      dashboard: dashboard.html
      settings: settings.html
      config: config.html
permissions:
  scopes:
    - storage:app
    # Spike M0-2: validate asApp reads + content permission check for other users
    - read:page:confluence
    - read:content.permission:confluence
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/506cd05b-b77c-4ca1-acb9-e11ac9fc6868
  storage:
    entities:
      - name: confirmation
        attributes:
          pageId:
            type: string
          accountId:
            type: string
          pageVersion:
            type: integer
          confirmedAt:
            type: string
          spaceKey:
            type: string
        indexes:
          - name: by-page
            partition:
              - pageId
            range:
              - confirmedAt
          - name: by-user
            partition:
              - accountId
            range:
              - confirmedAt
          - name: by-page-user
            partition:
              - pageId
              - accountId
            range:
              - pageVersion
      - name: page-config
        attributes:
          pageId:
            type: string
          active:
            type: boolean
          spaceKey:
            type: string
        indexes:
          - name: tracked
            partition:
              - active
            range:
              - spaceKey
