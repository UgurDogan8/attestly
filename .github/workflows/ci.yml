name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # UI Kit resources (src/frontend/*.tsx) are still bundled directly by
      # the Forge CLI at deploy time, no build step needed for those (docs/07
      # §1, §3). The one exception, post-PR-review (docs/07 §5): the Custom
      # UI export surface needs a real Vite build before `forge lint`/deploy
      # can see its resource output — forge lint fails with "missing
      # resource" otherwise (src/release/manifest.test.ts's TC-H2 doesn't
      # catch this; only forge lint does).
      - run: npm ci --prefix static/export-ui
      - run: npm run build --prefix static/export-ui
      - run: npm run typecheck --prefix static/export-ui
      - run: npm run test:coverage
      - name: forge lint
        run: npx -y @forge/cli@latest lint
      # Coverage gate (jest.config.js: domain 95% branches, overall 80%
      # lines, docs/07 §7) now enforced -- T2/T3/T4 pushed real coverage past
      # both thresholds. If a later task's stub work dips it, fix coverage in
      # the same PR rather than reverting to plain `npm test`.
      #
      # T14 release guards, enforced above via `npm run test:coverage`:
      # - src/release/manifest.test.ts — scope snapshot (TC-H1) + zero-
      #   webtrigger assertion (TC-H2), replacing the reference's `forge
      #   eligibility` RoA gate. The badge itself is no longer forfeited
      #   post-PR-review (docs/07 §5/§6): there is no webtrigger left to
      #   trade it away for.
      # See docs/09_deploy_procedure.md for the staging→production procedure
      # and the (still manual, not yet a CI job) deploy commands.
      # TODO(T1, before first deploy): staging deploy on main merge (needs
      # FORGE_EMAIL/FORGE_API_TOKEN secrets — docs/09 §0.3).
