modules:
  macro:
    - key: acknowledge-macro # Epic A — confirmation block (T6)
      resource: macro
      render: native
      resolver:
        function: resolver
      title: Read confirmation
      # NO `config:` block — assignment is a UI Kit Modal opened from inside the
      # macro (docs/07 §4.3), never a native macro-config panel. This keeps the
      # hard rule "assignment data never enters page ADF" (tech design §11.6)
      # trivially true: there is no macro config ADF to leak into.
  confluence:contentBylineItem:
    - key: acknowledge-byline # Epic A3 — per-user status (T8)
      resource: byline
      render: native
      resolver:
        function: resolver
      title: Read confirmation # static fallback; dynamicProperties below overrides per viewer
      dynamicProperties:
        function: bylineProps # chip title/tooltip (src/resolvers/bylineProps.ts) —
        # platform re-invokes this automatically after the dialog closes,
        # which is how the chip refreshes (docs/06 T8 accept criteria) —
        # no push-update code needed.
  confluence:globalPage:
    - key: acknowledge-dashboard # Epic C — admin dashboard (T9/T10)
      resource: dashboard
      render: native
      route: read-confirmations
      title: Read confirmations
      resolver:
        function: resolver
    - key: acknowledge-export # T11/T12, revised post-PR-review (docs/07 §5)
      # The ONLY Custom UI surface in this app (no `render: native`) — the
      # single deliberate exception to "UI Kit only, no build step"
      # (README.md). It exists purely because UI Kit has no Blob/DOM
      # download API: everything else (role gate, viewer-visibility
      # filtering, row building, CSV/PDF byte assembly) still happens
      # entirely server-side in the same `resolver` function this app
      # already uses everywhere else (src/resolvers/export.ts's `exportFile`
      # resolver) — this page's only job is to call it via invoke() and turn
      # the returned bytes into a browser download. There is no webtrigger
      # anywhere in this app: no token, no shared secret, no separate
      # download URL to guard, leak, or replay.
      resource: export-ui
      route: read-confirmations-export
      title: Export read confirmations
      resolver:
        function: resolver
  confluence:globalSettings:
    - key: acknowledge-settings # Epic G — app settings (T13)
      resource: settings
      render: native
      title: Read Confirmation
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
    - key: bylineProps
      handler: resolvers/bylineProps.handler
resources:
  - key: macro
    path: src/frontend/macro.tsx
  - key: byline
    path: src/frontend/byline.tsx
  - key: dashboard
    path: src/frontend/dashboard.tsx
  - key: settings
    path: src/frontend/settings.tsx
  - key: export-ui
    path: static/export-ui/build
permissions:
  scopes:
    - storage:app # KVS custom entities
    - read:page:confluence # page version + title (v2 API)
    - read:user:confluence # display names at render time
    - read:group:confluence # group membership resolution
    - read:content.permission:confluence # other-user cannot-view checks
  # No write:* scopes in v1. No external egress to any third party in any
  # version (§7). No webtrigger in this app (docs/07 §5) — every inbound
  # call, including export, goes through the normal Forge resolver/invoke()
  # path, the same as every other surface.
app:
  runtime:
    name: nodejs22.x
  # Registered under the owner's own Atlassian account (Uğur DOĞAN) — this is
  # the app already installed on ugurdogan.atlassian.net's development
  # environment (docs/09).
  id: ari:cloud:ecosystem::app/4407810c-a553-405b-821d-2965b8bd4379
  storage:
    entities:
      - name: confirmation
        attributes:
          pageId:
            type: string
          spaceKey:
            type: string
          pageVersion:
            type: integer
          accountId:
            type: string
          confirmedAt:
            type: string
          assignmentType:
            type: string
          appVersion:
            type: string
          schemaVersion:
            type: integer
        indexes:
          - name: by-page
            partition:
              - pageId
            range:
              - confirmedAt
          - name: by-user
            partition:
              - accountId
            range:
              - confirmedAt
          - name: by-page-user
            partition:
              - pageId
              - accountId
            range:
              - pageVersion
      - name: page-config
        attributes:
          pageId:
            type: string
          spaceKey:
            type: string
          active:
            type: boolean
          dueDate:
            type: string
          reconfirmOnChange:
            type: boolean
          createdBy:
            type: string
          createdAt:
            type: string
          updatedBy:
            type: string
          updatedAt:
            type: string
          schemaVersion:
            type: integer
          assignedUsers:
            type: any
          assignedGroups:
            type: any
          counters:
            type: any
        indexes:
          - name: tracked
            partition:
              - active
            range:
              - spaceKey
      - name: settings
        attributes:
          schemaVersion:
            type: integer
          complianceManagersGroupId:
            type: string
          reconfirmDefault:
            type: boolean
      - name: config-audit
        attributes:
          pageId:
            type: string
          at:
            type: string
          actor:
            type: string
          entry:
            type: any
          schemaVersion:
            type: integer
        indexes:
          - name: by-page
            partition:
              - pageId
            range:
              - at
