modules:
  macro:
    - key: acknowledge-macro # Epic A — confirmation block (T6)
      resource: macro
      render: native
      resolver:
        function: resolver
      title: Read confirmation
      # NO `config:` block — assignment is a UI Kit Modal opened from inside the
      # macro (docs/07 §4.3), never a native macro-config panel. This keeps the
      # hard rule "assignment data never enters page ADF" (tech design §11.6)
      # trivially true: there is no macro config ADF to leak into.
  confluence:contentBylineItem:
    - key: acknowledge-byline # Epic A3 — per-user status (T8)
      resource: byline
      render: native
      resolver:
        function: resolver
      title: Read confirmation # static fallback; dynamicProperties below overrides per viewer
      dynamicProperties:
        function: bylineProps # chip title/tooltip (src/resolvers/bylineProps.ts) —
        # platform re-invokes this automatically after the dialog closes,
        # which is how the chip refreshes (docs/06 T8 accept criteria) —
        # no push-update code needed.
  confluence:globalPage:
    - key: acknowledge-dashboard # Epic C — admin dashboard (T9/T10)
      resource: dashboard
      render: native
      route: read-confirmations
      title: Read confirmations
      resolver:
        function: resolver
  confluence:globalSettings:
    - key: acknowledge-settings # Epic G — app settings (T13)
      resource: settings
      render: native
      title: Read Confirmation
      resolver:
        function: resolver
  webtrigger:
    # The ONLY webtrigger in this app — UI Kit cannot trigger a browser
    # download itself, so file export needs one real HTTPS endpoint (docs/07
    # §5). It is token+secret guarded and only ever serves pages a prior
    # asUser() call already confirmed are visible to the requesting user —
    # never a permission bypass. Accepted trade-off: this alone forfeits the
    # "Runs on Atlassian" program badge, but NOT the "no external egress"
    # claim (a webtrigger is inbound only; the app still calls no third
    # party). See docs/07 §1 and §5 for the full reasoning.
    - key: export-trigger
      function: exportTrigger
      # TODO(T11, before first deploy, per environment): run
      # `forge variables set --encrypt EXPORT_SECRET <random-value>` -- the
      # webtrigger 403s without it (src/webtriggers/export.ts). Never commit
      # the value; it's the shared secret the export URL's `k` query param is
      # checked against (docs/07 §5).
  function:
    - key: resolver
      handler: index.handler
    - key: exportTrigger
      handler: webtriggers/export.handler
    - key: bylineProps
      handler: resolvers/bylineProps.handler
resources:
  - key: macro
    path: src/frontend/macro.tsx
  - key: byline
    path: src/frontend/byline.tsx
  - key: dashboard
    path: src/frontend/dashboard.tsx
  - key: settings
    path: src/frontend/settings.tsx
permissions:
  scopes:
    - storage:app # KVS custom entities
    - read:page:confluence # page version + title (v2 API)
    - read:user:confluence # display names at render time
    - read:group:confluence # group membership resolution
    - read:content.permission:confluence # other-user cannot-view checks
  # No write:* scopes in v1. No external egress to any third party in any
  # version (§7) — the export webtrigger is an inbound endpoint only.
app:
  runtime:
    name: nodejs22.x
  # TODO(T1, before first deploy): this id was inherited from the reference
  # scaffold's spike registration (kostebekteknoloji's Atlassian account).
  # Run `forge register "Attestly"` under the owner's own Atlassian account
  # before the first `forge deploy` — that command rewrites this id. Do not
  # deploy against someone else's registered app id.
  id: ari:cloud:ecosystem::app/560c26ed-f8d8-4c20-8646-67d59784d534
  storage:
    entities:
      - name: confirmation
        attributes:
          pageId:
            type: string
          spaceKey:
            type: string
          pageVersion:
            type: integer
          accountId:
            type: string
          confirmedAt:
            type: string
          assignmentType:
            type: string
          appVersion:
            type: string
          schemaVersion:
            type: integer
        indexes:
          - name: by-page
            partition:
              - pageId
            range:
              - confirmedAt
          - name: by-user
            partition:
              - accountId
            range:
              - confirmedAt
          - name: by-page-user
            partition:
              - pageId
              - accountId
            range:
              - pageVersion
      - name: page-config
        attributes:
          pageId:
            type: string
          spaceKey:
            type: string
          active:
            type: boolean
          dueDate:
            type: string
          reconfirmOnChange:
            type: boolean
          createdBy:
            type: string
          createdAt:
            type: string
          updatedBy:
            type: string
          updatedAt:
            type: string
          schemaVersion:
            type: integer
          assignedUsers:
            type: any
          assignedGroups:
            type: any
          counters:
            type: any
        indexes:
          - name: tracked
            partition:
              - active
            range:
              - spaceKey
      - name: settings
        attributes:
          schemaVersion:
            type: integer
          complianceManagersGroupId:
            type: string
          reconfirmDefault:
            type: boolean
      - name: config-audit
        attributes:
          pageId:
            type: string
          at:
            type: string
          actor:
            type: string
          entry:
            type: any
          schemaVersion:
            type: integer
        indexes:
          - name: by-page
            partition:
              - pageId
            range:
              - at
      - name: export-job
        # T11 (docs/07 §5): transient, one-time, TTL ~5 min (storage/exportJobs.ts).
        # Looked up by its key alone (exportjob#{token}) -- no index needed.
        attributes:
          token:
            type: string
          requestedBy:
            type: string
          format:
            type: string
          scope:
            type: string
          statusFilter:
            type: string
          dateFrom:
            type: string
          dateTo:
            type: string
          pages:
            type: any
          createdAt:
            type: string
